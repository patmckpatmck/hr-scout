name: Daily Update Results

on:
  schedule:
    - cron: '0 7 * * *'     # 3:00 AM ET during EDT (after all games end)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update_results.py
        run: python3 scripts/update_results.py

      - name: Configure git
        run: |
          git config user.name "hr-scout-bot"
          git config user.email "bot@homerunscout.com"

      - name: Commit and push
        run: |
          git add public/history.json
          git diff --cached --quiet || git commit -m "automated: update yesterday's HR results"
          git push
