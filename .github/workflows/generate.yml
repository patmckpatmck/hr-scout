name: Daily Generate

on:
  schedule:
    - cron: '30 14 * * *'   # 10:30 AM ET during EDT (MLB season)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/generate.py

      - name: Configure git
        run: |
          git config user.name "hr-scout-bot"
          git config user.email "bot@homerunscout.com"

      - name: Commit and push
        run: |
          git add public/data.json public/history.json
          git diff --cached --quiet || git commit -m "automated: daily generate"
          git push
